# Hyprland config for the Surface Pro X, modelled on Omarchy's defaults
# (https://github.com/basecamp/omarchy) with the Tokyo Night theme.
# Omarchy routes most binds through its own omarchy-* helper scripts; here the
# same actions are wired to plain binaries so they work without that toolchain.
# Docs: https://wiki.hyprland.org/Configuring/

### Monitors #################################################################
# SPX panel is 2880x1920. Omarchy scales hidpi via GDK_SCALE=2; on a 13" tablet
# a fractional Wayland scale keeps everything crisp and legible for touch.
monitor = ,preferred,auto,1.6

### Programs #################################################################
$terminal = alacritty
$menu     = wofi --show drun
$browser  = chromium
$files    = nautilus --new-window

### Autostart ################################################################
exec-once = swayosd-server
exec-once = waybar
exec-once = mako
exec-once = hypridle
exec-once = swaybg -c 1a1b26
exec-once = systemctl --user start hyprpolkitagent
exec-once = nm-applet --indicator
exec-once = blueman-applet

### Environment ##############################################################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = OZONE_PLATFORM,wayland
env = XDG_CURRENT_DESKTOP,Hyprland

### Input ####################################################################
input {
    kb_layout = us
    kb_options = compose:caps
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
        tap-to-click = true
    }
}

# Touchscreen: 3-finger swipe to switch workspaces.
gestures {
    workspace_swipe = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    key_press_enables_dpms = true
    mouse_move_enables_dpms = true
    focus_on_activate = true
}

### Look & feel (Omarchy values) #############################################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    # Tokyo Night: solid accent for the active border, neutral grey inactive.
    col.active_border = rgb(7aa2f7)
    col.inactive_border = rgba(595959aa)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 0

    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 2
        passes = 2
        vibrancy = 0.1696
        brightness = 0.6
        contrast = 0.75
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1.0
    bezier = quick, 0.15, 0, 0.1, 1

    animation = windows, 1, 3.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = border, 1, 5.39, easeOutQuint
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = workspaces, 1, 1.94, almostLinear, fade
}

# Window opacity, Omarchy-style.
windowrule = opacity 0.97 0.9, class:.*

### Keybinds (SUPER = mod, Omarchy layout) ###################################
$mod = SUPER

bind = $mod, RETURN, exec, $terminal
bind = $mod, SPACE, exec, $menu
bind = $mod, B, exec, $browser
bind = $mod, E, exec, $files
bind = $mod, W, killactive,
bind = $mod, F, fullscreen, 0
bind = $mod ALT, F, fullscreen, 1
bind = $mod, T, togglefloating,
bind = $mod, J, togglesplit,
bind = $mod, P, pseudo,
bind = $mod SHIFT, M, exit,
bind = $mod CTRL, L, exec, hyprlock

# Focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move windows
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Cycle workspaces / windows
bind = $mod, TAB, workspace, e+1
bind = $mod SHIFT, TAB, workspace, e-1

# Screenshots (grim + slurp + satty), color picker, notifications
bind = , Print, exec, grim -g "$(slurp)" - | satty --filename - --copy-command wl-copy --early-exit
bind = SHIFT, Print, exec, grim - | satty --filename - --copy-command wl-copy --early-exit
bind = $mod, Print, exec, hyprpicker -a
bind = $mod, COMMA, exec, makoctl dismiss
bind = $mod SHIFT, COMMA, exec, makoctl dismiss --all

# Clipboard / mouse window management
bind = $mod, C, exec, wl-copy
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Media & brightness via swayosd (on-screen display)
bindel = , XF86AudioRaiseVolume,  exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume,  exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute,         exec, swayosd-client --output-volume mute-toggle
bindel = , XF86AudioMicMute,      exec, swayosd-client --input-volume mute-toggle
bindel = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindel = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPrev,  exec, playerctl previous
