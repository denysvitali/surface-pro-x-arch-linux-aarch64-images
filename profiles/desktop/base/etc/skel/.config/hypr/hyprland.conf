# Hyprland config for the Surface Pro X, Omarchy-flavoured.
# Docs: https://wiki.hyprland.org/Configuring/

# Touchscreen-friendly scaling: the SPX panel is 2880x1920. 1.5x keeps UI legible.
monitor = ,preferred,auto,1.5

# Programs
$terminal = alacritty
$menu     = wofi --show drun
$browser  = chromium

# Autostart
exec-once = waybar
exec-once = mako
exec-once = swaybg -c 1e1e2e
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = nm-applet --indicator
exec-once = blueman-applet

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# Touchscreen gestures: 3-finger swipe to switch workspaces.
gestures {
    workspace_swipe = true
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(89b4faff)
    col.inactive_border = rgba(45475aff)
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 2
    }
}

animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1.0
    animation = windows, 1, 4, ease
    animation = workspaces, 1, 4, ease
    animation = fade, 1, 4, ease
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

# Keybinds
$mod = SUPER

bind = $mod, RETURN, exec, $terminal
bind = $mod, Q, killactive,
bind = $mod, M, exit,
bind = $mod, E, exec, thunar
bind = $mod, R, exec, $menu
bind = $mod, B, exec, $browser
bind = $mod, V, togglefloating,
bind = $mod, F, fullscreen,
bind = $mod, L, exec, hyprlock

# Move focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Screenshot region
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

# Media / brightness keys
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Mouse window management
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
