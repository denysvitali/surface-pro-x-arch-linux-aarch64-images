# Lock screen, Catppuccin Mocha-ish.
background {
    monitor =
    color = rgba(30, 30, 46, 1.0)
}

input-field {
    monitor =
    size = 250, 50
    position = 0, -80
    halign = center
    valign = center
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    inner_color = rgba(49, 50, 68, 1.0)
    outer_color = rgba(137, 180, 250, 1.0)
    font_color = rgba(205, 214, 244, 1.0)
    placeholder_text = <i>Password...</i>
}

label {
    monitor =
    text = $TIME
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    color = rgba(205, 214, 244, 1.0)
    position = 0, 120
    halign = center
    valign = center
}
