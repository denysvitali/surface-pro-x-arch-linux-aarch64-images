# hyprlock, Tokyo Night (Omarchy-style: blurred wallpaper, centered field).
$color        = rgba(1a1b26ff)
$inner_color  = rgba(1a1b26cc)
$outer_color  = rgba(a9b1d6ff)
$font_color   = rgba(a9b1d6ff)
$check_color  = rgba(7aa2f7ff)
$font         = JetBrainsMono Nerd Font

general {
    ignore_empty_input = true
    hide_cursor = true
}

background {
    monitor =
    color = $color
    blur_passes = 3
}

input-field {
    monitor =
    size = 600, 100
    position = 0, -40
    halign = center
    valign = center
    outline_thickness = 4
    rounding = 0
    inner_color = $inner_color
    outer_color = $outer_color
    check_color = $check_color
    font_color = $font_color
    placeholder_text = <i>Enter password...</i>
    fade_on_empty = false
}

label {
    monitor =
    text = $TIME
    font_size = 100
    font_family = $font
    color = $font_color
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    font_size = 22
    font_family = $font
    color = $font_color
    position = 0, 100
    halign = center
    valign = center
}
