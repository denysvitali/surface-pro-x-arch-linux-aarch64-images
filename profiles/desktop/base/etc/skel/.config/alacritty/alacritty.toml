# Alacritty, Omarchy defaults + Tokyo Night palette.
[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[font]
size = 9
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold   = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }

[window]
padding = { x = 14, y = 14 }
decorations = "None"
opacity = 0.97

[keyboard]
bindings = [
  { key = "Insert", mods = "Shift",   action = "Paste" },
  { key = "Insert", mods = "Control", action = "Copy" },
]

# Tokyo Night
[colors.primary]
background = "#1a1b26"
foreground = "#a9b1d6"

[colors.cursor]
cursor = "#c0caf5"
text   = "#1a1b26"

[colors.selection]
background = "#7aa2f7"
text       = "#c0caf5"

[colors.normal]
black   = "#32344a"
red     = "#f7768e"
green   = "#9ece6a"
yellow  = "#e0af68"
blue    = "#7aa2f7"
magenta = "#ad8ee6"
cyan    = "#449dab"
white   = "#787c99"

[colors.bright]
black   = "#444b6a"
red     = "#ff7a93"
green   = "#b9f27c"
yellow  = "#ff9e64"
blue    = "#7da6ff"
magenta = "#bb9af7"
cyan    = "#0db9d7"
white   = "#acb0d0"
