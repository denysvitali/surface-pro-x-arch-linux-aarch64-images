# Fix false pen-button presses on the Surface Pro X stylus.
# iptsd reads its packaged default config from /etc/iptsd.conf and merges
# drop-in overrides from /etc/iptsd.d/*.conf on top. This drop-in raises the
# DFT button-detection magnitude threshold so spurious stylus-button events are
# ignored, per the linux-surface Surface Pro X wiki recommendation.
#
# NOTE: the older wiki path /etc/ipts.conf is OUTDATED and does not apply to
# current iptsd.
[DFT]
ButtonMinMag = 4000
