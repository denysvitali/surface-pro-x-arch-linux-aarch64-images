name: Build and publish Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'test-image-*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aarch64-arch-mkimg

jobs:
  build:
    name: Build ${{ matrix.profile }} Image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        profile: [default, desktop]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker container
        run: |
          docker buildx build --output type=docker -t aarch64-arch-mkimg .

      - name: Build ${{ matrix.profile }} image
        run: |
          mkdir build
          docker run --rm --privileged                  \
              --mount type=tmpfs,destination=/run/shm   \
              -v /dev:/dev                              \
              -v "${PWD}/build":/build                  \
              aarch64-arch-mkimg ${{ matrix.profile }}

      - name: Rename image file
        run: |
          mv ./build/disk.img aarch64-arch-spx-${{ matrix.profile }}.img

      - name: Archive build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}.img
          path: aarch64-arch-spx-${{ matrix.profile }}.img

  release:
    name: Publish release
    needs: [build]
    # Publish a release for every push (and tag). Tag pushes get a normal
    # release named after the tag; branch pushes get a date-versioned release
    # tagged v<YYYY.MM.DD.HHMM> (UTC). Runs even if one profile in the build
    # matrix failed (!cancelled) and releases whatever images were produced, so
    # a work-in-progress profile does not block releasing the others.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Prepare release metadata
      id: rel
      run: |
        shopt -s nullglob
        imgs=(artifacts/*.img)
        if [[ ${#imgs[@]} -eq 0 ]]; then
          echo "No image artifacts were produced; skipping release."
          echo "publish=false" >> "${GITHUB_OUTPUT}"
          exit 0
        fi
        echo "Found images: ${imgs[*]}"
        echo "publish=true" >> "${GITHUB_OUTPUT}"

        if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
          echo "tag=${GITHUB_REF#refs/tags/}" >> "${GITHUB_OUTPUT}"
        else
          # Date-versioned tag, e.g. v2026.05.30.0011 (UTC, minute resolution).
          echo "tag=v$(date -u +%Y.%m.%d.%H%M)" >> "${GITHUB_OUTPUT}"
        fi
        echo "prerelease=false" >> "${GITHUB_OUTPUT}"

    - name: Compress images
      if: ${{ steps.rel.outputs.publish == 'true' }}
      # GitHub rejects release assets >= 2 GiB. Raw disk images exceed that
      # (the desktop image is ~2.3 GiB), but they compress heavily because most
      # of the partition is empty. zstd keeps the result well under the limit
      # and is the native Arch compression format.
      run: |
        cd artifacts
        for img in *.img; do
          echo "Compressing ${img}..."
          zstd -T0 -12 --rm "${img}"
        done
        ls -la

    - name: Publish release
      if: ${{ steps.rel.outputs.publish == 'true' }}
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: artifacts/*.img.zst
        file_glob: true
        tag: ${{ steps.rel.outputs.tag }}
        release_name: Build ${{ steps.rel.outputs.tag }}
        prerelease: ${{ steps.rel.outputs.prerelease }}
        target_commit: ${{ github.sha }}
        overwrite: true
        body: |
          Automated image build for commit ${{ github.sha }}.

          Images are zstd-compressed. Flash with, e.g.:
          `zstd -d aarch64-arch-spx-default.img.zst -c | sudo dd of=/dev/sdX bs=4M status=progress && sync`
