name: Build and publish Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'test-image-*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/aarch64-arch-mkimg

jobs:
  build:
    name: Build ${{ matrix.profile }} Image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        profile: [default, desktop]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker container
        run: |
          docker buildx build --output type=docker -t aarch64-arch-mkimg .

      - name: Build ${{ matrix.profile }} image
        run: |
          mkdir build
          docker run --rm --privileged                  \
              --mount type=tmpfs,destination=/run/shm   \
              -v /dev:/dev                              \
              -v "${PWD}/build":/build                  \
              aarch64-arch-mkimg ${{ matrix.profile }}

      - name: Rename image file
        run: |
          mv ./build/disk.img aarch64-arch-spx-${{ matrix.profile }}.img

      - name: Archive build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.profile }}.img
          path: aarch64-arch-spx-${{ matrix.profile }}.img

  release:
    name: Publish release
    needs: [build]
    # Only publish a release for tag pushes; on branch pushes github.ref is a
    # branch (e.g. refs/heads/main) for which no release exists, so the upload
    # would fail with "Not Found". The built images are still available as
    # workflow artifacts on every run.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: Upload assets
      uses: svenstaro/upload-release-action@v2
      with:
        file: ./artifacts/*
        tag: ${{ github.ref }}
        overwrite: true
        file_glob: true
